<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnBrain AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #7B2FFF;
            --primary-light: #9D5FFF;
            --primary-dark: #5B0FFF;
            --bg-dark: #0D0D1A;
            --bg-darker: #09090F;
            --bg-card: #1A1A2E;
            --text-primary: #FFFFFF;
            --text-secondary: #B0B0C0;
            --border: #2A2A3E;
            --success: #10B981;
            --error: #EF4444;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Oxygen", "Ubuntu", "Cantarell", "Helvetica Neue", sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            overflow: hidden;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: linear-gradient(135deg, var(--bg-darker) 0%, var(--bg-dark) 100%);
        }

        /* ================== WELCOME PAGE ================== */
        .page {
            display: none;
            flex: 1;
            overflow: hidden;
            animation: fadeIn 0.3s ease-in-out;
        }

        .page.active {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .welcome-page {
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }

        .welcome-header {
            margin-bottom: 40px;
        }

        .welcome-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .welcome-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .welcome-greeting {
            font-size: 18px;
            color: var(--text-secondary);
            margin-bottom: 30px;
        }

        .welcome-content {
            max-width: 320px;
            margin-bottom: 40px;
        }

        .welcome-text {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .email-input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .email-input-group input {
            padding: 12px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        .email-input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(123, 47, 255, 0.1);
        }

        .email-input-group input::placeholder {
            color: var(--text-secondary);
        }

        .start-button {
            width: 100%;
            padding: 14px 20px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(123, 47, 255, 0.3);
        }

        .start-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(123, 47, 255, 0.4);
        }

        .start-button:active {
            transform: translateY(0);
        }

        .start-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ================== CHAT PAGE ================== */
        .chat-page {
            flex-direction: column;
        }

        .chat-header {
            padding: 16px 20px;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
            border-bottom: 1px solid var(--border);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .header-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .header-subtitle {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.8);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .messages-container::-webkit-scrollbar {
            width: 6px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .messages-container::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        .message {
            display: flex;
            gap: 10px;
            animation: slideIn 0.3s ease-out;
        }

        .message.user {
            justify-content: flex-end;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 16px;
            word-wrap: break-word;
            line-height: 1.4;
            font-size: 15px;
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
            color: white;
            border-radius: 16px 4px 16px 16px;
        }

        .message.ai .message-bubble {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: 4px 16px 16px 16px;
        }

        .loading-dots {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .loading-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary);
            animation: bounce 1.4s infinite;
        }

        .loading-dot:nth-child(1) {
            animation-delay: -0.32s;
        }

        .loading-dot:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(1);
                opacity: 0.7;
            }
            40% {
                transform: scale(1.2);
                opacity: 1;
            }
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
            text-align: center;
            padding: 20px;
        }

        .empty-state-icon {
            font-size: 60px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 16px;
            margin-bottom: 5px;
        }

        .empty-state-subtext {
            font-size: 13px;
            opacity: 0.7;
        }

        .input-area {
            padding: 16px;
            border-top: 1px solid var(--border);
            background: var(--bg-darker);
        }

        .input-group {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 0 16px;
            transition: all 0.3s ease;
        }

        .input-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(123, 47, 255, 0.1);
        }

        .message-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            outline: none;
            padding: 12px 0;
            font-size: 15px;
            resize: none;
            max-height: 100px;
            font-family: inherit;
        }

        .message-input::placeholder {
            color: var(--text-secondary);
        }

        .send-button {
            width: 40px;
            height: 40px;
            min-width: 40px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(123, 47, 255, 0.3);
        }

        .send-button:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(123, 47, 255, 0.4);
        }

        .send-button:active {
            transform: scale(0.95);
        }

        .send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .send-button.loading {
            animation: rotate 0.8s linear infinite;
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        /* ================== MODALS ================== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            max-width: 300px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .modal-text {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .modal-button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-button.primary {
            background: var(--primary);
            color: white;
        }

        .modal-button.primary:hover {
            background: var(--primary-light);
        }

        .modal-button.secondary {
            background: var(--border);
            color: var(--text-primary);
        }

        .modal-button.secondary:hover {
            background: var(--border);
            opacity: 0.8;
        }

        /* ================== RESPONSIVE ================== */
        @media (max-width: 480px) {
            .message-bubble {
                max-width: 90%;
            }

            .welcome-title {
                font-size: 24px;
            }

            .modal-content {
                max-width: 90%;
                padding: 20px;
            }
        }

        /* ================== LOADING STATE ================== */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-secondary);
            opacity: 0.4;
            animation: typingAnimation 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typingAnimation {
            0%, 60%, 100% {
                opacity: 0.4;
                transform: translateY(0);
            }
            30% {
                opacity: 1;
                transform: translateY(-10px);
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- WELCOME PAGE -->
        <div id="welcomePage" class="page welcome-page active">
            <div class="welcome-header">
                <div class="welcome-icon">🤖</div>
                <h1 class="welcome-title">OnBrain AI</h1>
                <p class="welcome-greeting" id="welcomeGreeting">Xush kelibsiz!</p>
            </div>

            <div class="welcome-content">
                <p class="welcome-text">
                    OnBrain AI – sizning shaxsiy AI yordamchingiz. Barcha savollaringizga javob oling, maslahat olishingiz mumkin.
                </p>

                <div class="email-input-group" id="emailGroup" style="display: none;">
                    <input 
                        type="email" 
                        id="emailInput" 
                        placeholder="E-pochtangizni kiriting (ixtiyoriy)"
                    >
                </div>
            </div>

            <button class="start-button" id="startButton">
                Chatni boshlash →
            </button>
        </div>

        <!-- CHAT PAGE -->
        <div id="chatPage" class="page chat-page">
            <div class="chat-header">
                <div class="header-title">OnBrain AI 🤖</div>
                <div class="header-subtitle" id="userNameDisplay">Foydalanuvchi</div>
            </div>

            <div class="messages-container" id="messagesContainer">
                <div class="empty-state">
                    <div class="empty-state-icon">💬</div>
                    <div class="empty-state-text">Salom! Menga savollar bering</div>
                    <div class="empty-state-subtext">O'zbek tilida javob olasiz</div>
                </div>
            </div>

            <div class="input-area">
                <div class="input-group">
                    <div class="input-wrapper">
                        <input 
                            type="text" 
                            class="message-input" 
                            id="messageInput" 
                            placeholder="Savolni yozing..."
                            autocomplete="off"
                        >
                    </div>
                    <button class="send-button" id="sendButton">
                        ➤
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ERROR MODAL -->
    <div id="errorModal" class="modal">
        <div class="modal-content">
            <div class="modal-title">⚠️ Xato</div>
            <div class="modal-text" id="errorText">Biror xato yuz berdi</div>
            <div class="modal-buttons">
                <button class="modal-button primary" onclick="document.getElementById('errorModal').classList.remove('active')">
                    OK
                </button>
            </div>
        </div>
    </div>

    <script>
        // Initialize Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Get user data from Telegram
        const userData = tg.initDataUnsafe.user;
        const telegramId = userData?.id;
        const userName = userData?.first_name || "Foydalanuvchi";
        const userUsername = userData?.username || "";

        // API base URL
        const API_URL = "https://onbrain.onrender.com";

        // State
        let isFirstTime = true;
        let currentUser = null;
        let isLoading = false;

        // ==================== INITIALIZATION ====================

        async function initApp() {
            try {
                // Check if user exists
                const response = await fetch(`${API_URL}/api/user/${telegramId}`);
                
                if (response.ok) {
                    const data = await response.json();
                    currentUser = data.user;
                    isFirstTime = false;
                    showChatPage();
                } else {
                    // First time user
                    showWelcomePage();
                }
            } catch (error) {
                console.error("Init error:", error);
                showWelcomePage();
            }
        }

        // ==================== WELCOME PAGE ====================

        function showWelcomePage() {
            document.getElementById("welcomePage").classList.add("active");
            document.getElementById("chatPage").classList.remove("active");
            document.getElementById("welcomeGreeting").textContent = `Xush kelibsiz, ${userName}!`;

            // Show email input if needed
            if (isFirstTime) {
                document.getElementById("emailGroup").style.display = "flex";
            }
        }

        // ==================== CHAT PAGE ====================

        function showChatPage() {
            document.getElementById("welcomePage").classList.remove("active");
            document.getElementById("chatPage").classList.add("active");
            document.getElementById("userNameDisplay").textContent = currentUser?.full_name || userName;
            loadChatHistory();
        }

        // ==================== CHAT FUNCTIONALITY ====================

        async function loadChatHistory() {
            try {
                const response = await fetch(`${API_URL}/api/history/${telegramId}`);
                const data = await response.json();

                if (data.success && data.messages.length > 0) {
                    const messagesContainer = document.getElementById("messagesContainer");
                    messagesContainer.innerHTML = "";

                    data.messages.forEach(msg => {
                        addMessageToUI(msg.question, "user", false);
                        addMessageToUI(msg.answer, "ai", false);
                    });

                    scrollToBottom();
                }
            } catch (error) {
                console.error("Load history error:", error);
            }
        }

        function addMessageToUI(text, sender, animate = true) {
            const container = document.getElementById("messagesContainer");

            // Remove empty state
            const emptyState = container.querySelector(".empty-state");
            if (emptyState) {
                emptyState.remove();
            }

            const messageDiv = document.createElement("div");
            messageDiv.className = `message ${sender}`;

            if (sender === "ai") {
                messageDiv.innerHTML = `
                    <div class="message-bubble">${escapeHtml(text)}</div>
                `;
            } else {
                messageDiv.innerHTML = `
                    <div class="message-bubble">${escapeHtml(text)}</div>
                `;
            }

            container.appendChild(messageDiv);

            if (animate) {
                scrollToBottom();
            }
        }

        function addLoadingMessage() {
            const container = document.getElementById("messagesContainer");
            const messageDiv = document.createElement("div");
            messageDiv.className = "message ai";
            messageDiv.id = "loadingMessage";
            messageDiv.innerHTML = `
                <div class="message-bubble">
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            `;

            container.appendChild(messageDiv);
            scrollToBottom();
        }

        function removeLoadingMessage() {
            const loadingMsg = document.getElementById("loadingMessage");
            if (loadingMsg) {
                loadingMsg.remove();
            }
        }

        async function sendMessage() {
            const input = document.getElementById("messageInput");
            const message = input.value.trim();

            if (!message || isLoading) {
                return;
            }

            isLoading = true;
            input.value = "";
            input.disabled = true;

            const sendButton = document.getElementById("sendButton");
            sendButton.disabled = true;
            sendButton.classList.add("loading");

            try {
                // Add user message to UI
                addMessageToUI(message, "user");
                addLoadingMessage();

                // Send to API
                const response = await fetch(`${API_URL}/api/chat`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        telegram_id: telegramId,
                        message: message
                    })
                });

                const data = await response.json();

                removeLoadingMessage();

                if (data.success) {
                    addMessageToUI(data.answer, "ai");
                } else {
                    showError(data.error || "Javob olishda xato");
                    addMessageToUI("Kechirasiz, javob olishda xato yuz berdi", "ai");
                }
            } catch (error) {
                console.error("Send message error:", error);
                removeLoadingMessage();
                showError(error.message);
                addMessageToUI("Kechirasiz, texnik xato yuz berdi", "ai");
            } finally {
                isLoading = false;
                input.disabled = false;
                sendButton.disabled = false;
                sendButton.classList.remove("loading");
                input.focus();
            }
        }

        // ==================== REGISTRATION ====================

        async function registerUser() {
            const emailInput = document.getElementById("emailInput");
            const email = emailInput?.value?.trim() || "";

            try {
                const response = await fetch(`${API_URL}/api/register`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        telegram_id: telegramId,
                        name: userName,
                        username: userUsername,
                        email: email
                    })
                });

                const data = await response.json();

                if (data.success) {
                    currentUser = data.user;
                    isFirstTime = false;
                    showChatPage();
                } else {
                    showError(data.error || "Ro'yxatdan o'tishda xato");
                }
            } catch (error) {
                console.error("Register error:", error);
                showError(error.message);
            }
        }

        // ==================== UTILITIES ====================

        function scrollToBottom() {
            const container = document.getElementById("messagesContainer");
            setTimeout(() => {
                container.scrollTop = container.scrollHeight;
            }, 0);
        }

        function showError(message) {
            document.getElementById("errorText").textContent = message;
            document.getElementById("errorModal").classList.add("active");
        }

        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text;
            return div.innerHTML;
        }

        // ==================== EVENT LISTENERS ====================

        document.getElementById("startButton").addEventListener("click", registerUser);

        document.getElementById("messageInput").addEventListener("keypress", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        document.getElementById("sendButton").addEventListener("click", sendMessage);

        // ==================== START APP ====================

        window.addEventListener("load", () => {
            initApp();
        });

        // Handle Telegram back button
        tg.onEvent("backButtonClicked", () => {
            if (!document.getElementById("welcomePage").classList.contains("active")) {
                showWelcomePage();
                tg.BackButton.hide();
            }
        });

        // Show back button in chat
        const observer = new MutationObserver(() => {
            const chatPageActive = document.getElementById("chatPage").classList.contains("active");
            if (chatPageActive) {
                tg.BackButton.show();
            } else {
                tg.BackButton.hide();
            }
        });

        observer.observe(document.getElementById("chatPage"), { attributes: true, attributeFilter: ["class"] });
    </script>
</body>
</html>
